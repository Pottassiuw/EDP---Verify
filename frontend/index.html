<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificador de IDs · EDP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- ── UPLOAD ── -->
    <div id="upload-screen">
      <div
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1rem;
        "
      >
        <div class="edp-logo">
          <svg
            width="52"
            height="52"
            viewBox="0 0 52 52"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="52" height="52" rx="6" fill="#00A859" />
            <text
              x="26"
              y="34"
              font-family="'Barlow Condensed',Arial,sans-serif"
              font-size="22"
              font-weight="700"
              fill="white"
              text-anchor="middle"
              letter-spacing="1"
            >
              EDP
            </text>
          </svg>
          <div class="edp-logo-text">
            EDP Brasil<span>Verificador de IDs</span>
          </div>
        </div>
      </div>

      <label class="upload-box" id="upload-box">
        <input type="file" id="file-input" accept=".xlsx,.xls,.csv" />
        <div class="upload-icon">📊</div>
        <h2>Importar Planilha</h2>
        <p>Arraste o arquivo aqui ou clique para selecionar</p>
        <div style="margin: 1.2rem 0">
          <span class="upload-btn-label">Selecionar Arquivo</span>
        </div>
        <div class="upload-formats">
          <span class="fmt-tag">.xlsx</span>
          <span class="fmt-tag">.xls</span>
          <span class="fmt-tag">.csv</span>
        </div>
        <div class="loader" id="loader"><span></span></div>
      </label>
    </div>

    <!-- ── DASHBOARD ── -->
    <div id="dashboard-screen">
      <!-- Overlay sidebar (mobile/tablet) -->
      <div
        class="sidebar-overlay"
        id="sidebar-overlay"
        onclick="closeSidebar()"
      ></div>

      <div class="layout">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-brand">
            <div class="edp-logo">
              <svg width="30" height="30" viewBox="0 0 52 52" fill="none">
                <rect width="52" height="52" rx="6" fill="#00A859" />
                <text
                  x="26"
                  y="34"
                  font-family="'Barlow Condensed',Arial,sans-serif"
                  font-size="22"
                  font-weight="700"
                  fill="white"
                  text-anchor="middle"
                  letter-spacing="1"
                >
                  EDP
                </text>
              </svg>
              <div class="edp-logo-text">Verificador<span>de IDs</span></div>
            </div>
            <button class="sidebar-close-btn" onclick="closeSidebar()">
              ✕
            </button>
          </div>

          <div class="sidebar-section-title">Filtro por Regra</div>
          <div class="rule-list" id="rule-list"></div>

          <div class="sidebar-upload-again">
            <button class="btn-upload-again" onclick="resetToUpload()">
              ↑ Nova Planilha
            </button>
          </div>
        </aside>

        <main class="main">
          <div class="topbar">
            <div class="topbar-left">
              <button
                class="hamburger"
                onclick="openSidebar()"
                title="Filtros por regra"
              >
                ☰
              </button>
              <h2>Painel de Ocorrências</h2>
              <span class="file-badge" id="file-badge">—</span>
            </div>
          </div>

          <div class="stats-row">
            <div class="stat-card accent-green">
              <div class="stat-label">Total</div>
              <div class="stat-value" id="s-total">0</div>
            </div>
            <div class="stat-card accent-ok">
              <div class="stat-label">Conformes</div>
              <div class="stat-value" id="s-ok">0</div>
            </div>
            <div class="stat-card accent-err">
              <div class="stat-label">Com Erros</div>
              <div class="stat-value" id="s-err">0</div>
            </div>
            <div class="stat-card accent-blue">
              <div class="stat-label">Visíveis</div>
              <div class="stat-value" id="s-show">0</div>
            </div>
          </div>

          <div class="filters-bar">
            <div class="filter grow">
              <label>Buscar (ID / Referência / Tipo)</label>
              <input id="f-search" placeholder="Ex: 12345678, AT-001…" />
            </div>
            <div class="filter">
              <label>Status</label>
              <select id="f-status">
                <option value="all">Todos</option>
                <option value="erro">Com Erro</option>
                <option value="ok">Conforme</option>
              </select>
            </div>
            <div class="filter">
              <label>Urgência</label>
              <select id="f-priority">
                <option value="all">Todas</option>
                <option value="high">Alta (1–2)</option>
                <option value="medium">Média (3–4)</option>
                <option value="low">Baixa (5+)</option>
              </select>
            </div>
            <div class="filter">
              <label>Situação</label>
              <select id="f-done">
                <option value="all">Todas</option>
                <option value="pending">Pendentes</option>
                <option value="done">Concluídas</option>
              </select>
            </div>
          </div>

          <!-- Tabela (tablet/desktop) -->
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID / Nota</th>
                  <th>Urgência</th>
                  <th>Tipo Nota</th>
                  <th>Referência</th>
                  <th>Falhas Encontradas</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>

          <!-- Cards (mobile) -->
          <div class="card-list" id="card-list"></div>
        </main>
      </div>
    </div>

    <!-- ── MODAL ── -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title-group">
            <h3 id="m-title">Detalhe da Nota</h3>
            <div class="modal-subtitle" id="m-subtitle"></div>
          </div>
          <button class="btn" onclick="closeModal()">✕ Fechar</button>
        </div>
        <div class="modal-body" id="m-content"></div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
