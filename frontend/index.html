<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>De olho no Problema 🔍 · EDP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- ── UPLOAD ── -->
    <div id="upload-screen">
      <div class="upload-brand">
        <img
          id="logo-upload"
          class="edp-logo-img"
          src="assets/RGB/Dark/Regular/NEG/EDP_Group_MasterLogo_RGB_Dark_NEG.svg"
          alt="EDP"
        />
        <p class="upload-brand-subtitle">🔍 De olho no Problema</p>
      </div>

      <label class="upload-box" id="upload-box">
        <input type="file" id="file-input" accept=".xlsx,.xls,.csv" />
        <div class="upload-icon">📊</div>
        <h2>Importar Planilha</h2>
        <p>Arraste o arquivo aqui ou clique para selecionar</p>
        <div style="margin: 1.2rem 0">
          <span class="upload-btn-label">Selecionar Arquivo</span>
        </div>
        <div class="upload-formats">
          <span class="fmt-tag">.xlsx</span>
          <span class="fmt-tag">.xls</span>
          <span class="fmt-tag">.csv</span>
        </div>
        <div class="loader" id="loader"><span></span></div>
      </label>
    </div>

    <!-- ── DASHBOARD ── -->
    <div id="dashboard-screen">
      <!-- Overlay sidebar (mobile/tablet) -->
      <div
        class="sidebar-overlay"
        id="sidebar-overlay"
        onclick="closeSidebar()"
      ></div>

      <div class="layout">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-brand">
            <div class="sidebar-logo-wrap">
              <img
                id="logo-sidebar"
                class="edp-logo-img sidebar-logo-img"
                src="assets/RGB/Dark/Regular/NEG/EDP_Group_MasterLogo_RGB_Dark_NEG.svg"
                alt="EDP"
              />
              <span class="sidebar-app-name">🔍 De olho no Problema</span>
            </div>
            <button class="sidebar-close-btn" onclick="closeSidebar()">
              ✕
            </button>
          </div>

          <div class="sidebar-section-title">Filtro por Regra</div>
          <button
            id="clear-rules-btn"
            class="clear-rules-btn"
            onclick="clearRules()"
            style="display: none"
          >
            Limpar regras
          </button>
          <div class="rule-list" id="rule-list"></div>

          <div class="sidebar-upload-again">
            <button class="btn-upload-again" onclick="resetToUpload()">
              ↑ Nova Planilha
            </button>
          </div>
        </aside>

        <main class="main">
          <div class="topbar">
            <div class="topbar-left">
              <button
                class="hamburger"
                onclick="openSidebar()"
                title="Filtros por regra"
              >
                ☰
              </button>
              <h2>🔍 De olho no Problema</h2>
              <span class="file-badge" id="file-badge">—</span>
            </div>
            <div class="topbar-right">
              <button
                class="theme-toggle-btn"
                id="theme-toggle"
                onclick="toggleTheme()"
                title="Alternar tema"
              >
                <span id="theme-icon">☀</span>
              </button>
            </div>
          </div>

          <div class="stats-row">
            <div class="stat-card accent-green">
              <div class="stat-label">Total</div>
              <div class="stat-value" id="s-total">0</div>
            </div>
            <div class="stat-card accent-ok">
              <div class="stat-label">Conformes</div>
              <div class="stat-value" id="s-ok">0</div>
            </div>
            <div class="stat-card accent-err">
              <div class="stat-label">Com Erros</div>
              <div class="stat-value" id="s-err">0</div>
            </div>
            <div class="stat-card accent-blue">
              <div class="stat-label">Visíveis</div>
              <div class="stat-value" id="s-show">0</div>
            </div>
            <div class="stat-card accent-done">
              <div class="stat-label">Concluídas</div>
              <div class="stat-value" id="s-done">0</div>
            </div>
          </div>

          <div class="filters-bar">
            <div class="filter grow">
              <label>Buscar (ID / Referência / Tipo)</label>
              <input
                id="f-search"
                placeholder="Ex: 12345, 67890, AT-001  (vírgula, espaço ou nova linha)"
              />
            </div>
            <div class="filter filter-uf">
              <label>Estado (UF) ★</label>
              <select id="f-uf">
                <option value="all">Todos os estados</option>
              </select>
            </div>
            <div class="filter filter-setor">
              <label>Setor</label>
              <select id="f-setor">
                <option value="all">Todos os setores</option>
              </select>
            </div>
            <div class="filter">
              <label>Status</label>
              <select id="f-status">
                <option value="all">Todos</option>
                <option value="erro">Com Erro</option>
                <option value="ok">Conforme</option>
              </select>
            </div>
            <div class="filter">
              <label>Urgência</label>
              <select id="f-priority">
                <option value="all">Todas</option>
                <option value="high">Alta (1–2)</option>
                <option value="medium">Média (3–4)</option>
                <option value="low">Baixa (5+)</option>
              </select>
            </div>
            <div class="filter">
              <label>Situação</label>
              <select id="f-done">
                <option value="all">Todas</option>
                <option value="pending">Pendentes</option>
                <option value="done">Concluídas</option>
              </select>
            </div>
          </div>

          <!-- Chips de filtros ativos -->
          <div id="chips-bar" class="chips-bar" style="display: none"></div>

          <!-- Tabela (tablet/desktop) -->
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="th-check">
                    <input
                      type="checkbox"
                      id="select-all"
                      onchange="toggleSelectAll()"
                      title="Selecionar todas as visíveis"
                    />
                  </th>
                  <th>ID / Nota</th>
                  <th>Urgência</th>
                  <th>Tipo Nota</th>
                  <th>Referência</th>
                  <th>Falhas Encontradas</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>

          <!-- Cards (mobile) -->
          <div class="card-list" id="card-list"></div>
        </main>
      </div>
    </div>

    <!-- ── Toolbar de seleção em lote ── -->
    <div class="selection-toolbar" id="selection-toolbar">
      <div class="sel-info">
        <strong id="sel-count">0</strong> selecionada(s)
      </div>
      <div class="sel-actions">
        <button class="btn btn-bulk-complete" onclick="bulkComplete()">
          ✓ Marcar concluídas
        </button>
        <button class="btn btn-bulk-coffee" onclick="bulkCoffee()">
          ☕ Abrir no COFFEE
        </button>
        <button class="btn btn-bulk-clear" onclick="clearSelection()">
          Limpar seleção
        </button>
      </div>
    </div>

    <!-- ── MODAL ── -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title-group">
            <h3 id="m-title">Detalhe da Nota</h3>
            <div class="modal-subtitle" id="m-subtitle"></div>
          </div>
          <button class="btn" onclick="closeModal()">✕ Fechar</button>
        </div>
        <div class="modal-body" id="m-content"></div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
